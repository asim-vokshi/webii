# Render Blueprint for the Asim Vokshi school website (Vite + React SPA).
# Deploys as a Web Service that builds the static bundle and serves it
# with SPA fallback via a tiny zero-dependency Node server (server.js).
#
# Uses npm (not pnpm/corepack) to avoid corepack signature-key issues on CI.
#
# To use: in Render dashboard -> "New +" -> "Blueprint" -> pick this repo.
services:
  - type: web
    name: asim-vokshi-website
    runtime: node
    plan: free
    region: frankfurt          # closest region to Albania; change if you prefer
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22.13.0"
