kind = "web"
previewPath = "/"
title = "Asim Vokshi School Website"
version = "1.0.0"
id = "artifacts/school-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21294

[services.development]
run = "npm run dev"

[services.production]
build = [ "npm", "run", "build" ]
publicDir = "dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21294"
BASE_PATH = "/"
